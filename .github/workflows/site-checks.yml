# .github/workflows/site-checks.yml
#
# Three jobs:
#  1) audit — builds the site and runs the SEO/launch gate on every push/PR (and
#     on the weekly cron). Fails on shippable-bug classes: broken assets,
#     placeholder links, missing 404, stale Event schema, sitemap drift… On the
#     Monday cron this doubles as the freshness tripwire — if the event data
#     wasn't rolled forward, the stale-Event check fails and GitHub emails you.
#  2) links — external-link check (lychee). External links rot on time, not on
#     your commits, and the check is flaky (rate limits, bot walls), so it runs
#     weekly and on-demand only — never gating a normal push/PR.
#  3) redeploy — Saturday cron, 30 min after the cleanup ends, that triggers a
#     fresh Cloudflare Pages build so the server-rendered CTA label ("Join us
#     this Saturday") and the Event JSON-LD flip forward to the next cleanup the
#     moment this one is over — for no-JS visitors and crawlers. (JS visitors get
#     it live from countdown.client.ts regardless.)
#
# Two crons feed this file (see `schedule` below); jobs pick their trigger with
# `github.event.schedule` so the Monday checks and the Saturday redeploy stay
# independent.
#
# Setup:
#  - Put seo-audit.mjs in scripts/.
#  - Add a Pages Deploy Hook (Cloudflare dashboard → your project → Settings →
#    Builds & deployments → Deploy hooks) as repo secret CF_PAGES_DEPLOY_HOOK.
#  - At domain cutover, change SITE below in the same PR that changes
#    astro.config `site`.

name: site checks

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 12 * * 1" # Mondays 12:00 UTC (~7–8am New York) — audit tripwire + links
    - cron: "30 15 * * 6" # Saturdays 15:30 UTC (11:30am EDT) — 30 min after the cleanup ends → redeploy
  workflow_dispatch: # lets you run the weekly links check on demand

env:
  SITE: https://plgcleanup.pages.dev # ← flip to https://plgcleanup.org at cutover

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx astro build
      - name: SEO / launch gate
        run: node scripts/seo-audit.mjs dist --site "$SITE"

  links:
    # Weekly (Monday cron) + on-demand only — keep flaky external-link checks off
    # push/PR, and off the Saturday redeploy cron.
    if: github.event.schedule == '0 12 * * 1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx astro build
      - name: External links (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          # Bot-walled hosts excluded: they 4xx for crawlers but work for humans.
          args: >-
            --no-progress --max-retries 2
            --accept 200..299,301,302,308,429
            --exclude instagram.com --exclude amazon.com --exclude discord.com
            --exclude washingtonpost.com
            'dist/**/*.html'
          fail: true

  redeploy:
    # Saturday cron only — 30 min after the cleanup ends. (Cron is UTC and can't
    # follow DST: 15:30 UTC is 11:30am EDT now; in winter EST it lands 10:30am.)
    if: github.event.schedule == '30 15 * * 6'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages build
        run: curl -fsX POST "$DEPLOY_HOOK"
        env:
          DEPLOY_HOOK: ${{ secrets.CF_PAGES_DEPLOY_HOOK }}
